  <circle cx="680" cy="60" r="2" fill="#e94560" opacity="0.4"/>
  <circle cx="900" cy="90" r="1.5" fill="#e94560" opacity="0.3"/>
  <circle cx="720" cy="220" r="2.5" fill="#e94560" opacity="0.35"/>
